name: Deploy to Plesk V-Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Projekt bauen
        run: pnpm run build

      - name: SSH-Key einrichten
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Known Host hinterlegen
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Build-Artefakte per rsync deployen
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT || '22' }}" \
            dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
